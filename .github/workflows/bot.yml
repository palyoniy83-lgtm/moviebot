name: Movie Bot

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"


jobs:

  run:

    runs-on: ubuntu-latest


    steps:

    - name: Download code
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install modules
      run:
        pip install -r requirements.txt


    - name: Start bot
      run:
        python bot.py
